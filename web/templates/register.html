<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join GreenFields Farm Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-green: #1b7a40;
            --brand-green-dark: #14532d;
            --bg-soft: #f3f8f3;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #e8f5e9 0, #f9fafb 55%, #f3f4f6 100%);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            background: #fff;
            border-radius: 28px;
            padding: 36px 32px 32px;
            width: 100%;
            max-width: 430px;
            margin: auto;
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }
        .farm-logo-circle {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: linear-gradient(145deg, var(--brand-green), var(--brand-green-dark));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fefce8;
            font-size: 1.2rem;
        }
        .brand-logo {
            font-weight: 800;
            color: var(--brand-green-dark);
            font-size: 1.4rem;
            text-decoration: none;
            display: block;
            margin-top: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .brand-subtitle {
            font-size: 0.8rem;
            color: #6b7280;
        }
        .form-control {
            background-color: var(--bg-soft);
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: var(--brand-green-dark);
            box-shadow: 0 0 0 1px rgba(22, 163, 74, 0.3);
        }
        .btn-register {
            background-color: var(--brand-green-dark);
            color: #fff;
            border-radius: 999px;
            font-weight: 700;
            padding: 11px;
            border: none;
            transition: 0.2s;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .btn-register:hover {
            background-color: #052e16;
            color: #f9fafb;
        }
        .login-link {
            color: var(--brand-green-dark);
            font-weight: 700;
            text-decoration: none;
        }
        .login-link:hover {
            color: var(--brand-green);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="register-card">
        <div class="text-center mb-4">
            <div class="farm-logo-circle">🌾</div>
            <a href="/" class="brand-logo">GREENFIELDS</a>
            <p class="brand-subtitle">Create your GreenFields farm pantry account.</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small border-0 rounded-3 text-center">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary text-uppercase">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a unique name" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary text-uppercase">Email</label>
                <input type="email" name="email" class="form-control" placeholder="We'll email a 6-digit code" required>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary text-uppercase">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-register">Sign Up</button>
            </div>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
            <p class="small text-muted mb-0">Already have an account?</p>
            <a href="/login" class="login-link">Sign in instead</a>
        </div>
    </div>
</div>

</body>
</html>
