<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join QuickStore | Groceries in Minutes</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #3c006b;
            --brand-green: #1c8932;
            --soft-gray: #f3f4f6;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--soft-gray);
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            margin: auto;
            border: none;
        }
        .brand-logo {
            font-weight: 800;
            color: var(--brand-purple);
            font-size: 1.8rem;
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }
        .form-control {
            background-color: var(--soft-gray);
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: var(--brand-purple);
            box-shadow: none;
        }
        .btn-register {
            background-color: var(--brand-purple);
            color: #fff;
            border-radius: 12px;
            font-weight: 700;
            padding: 12px;
            border: none;
            transition: 0.2s;
        }
        .btn-register:hover {
            background-color: #2a004d;
            color: #fff;
        }
        .login-link {
            color: var(--brand-green);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="register-card shadow-sm">
        <div class="text-center mb-4">
            <a href="/" class="brand-logo">QUICKSTORE</a>
            <h5 class="fw-bold mb-1">Create an Account</h5>
            <p class="text-muted small">Join us to order staples like <strong>Rice</strong> and <strong>Wheat</strong> instantly.</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small border-0 rounded-3 text-center">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary text-uppercase">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a unique name" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary text-uppercase">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-register">Sign Up</button>
            </div>
        </form>

        <div class="text-center mt-4 pt-3 border-top">
            <p class="small text-muted mb-0">Already have an account?</p>
            <a href="/login" class="login-link">Sign in instead</a>
        </div>
    </div>
</div>

</body>
</html>
