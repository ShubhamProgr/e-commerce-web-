<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify your account - GreenFields</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-green: #1b7a40;
            --brand-green-dark: #14532d;
            --bg-soft: #f3f8f3;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #e8f5e9 0, #f9fafb 55%, #f3f4f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .otp-card {
            background: #fff;
            border-radius: 28px;
            padding: 32px 28px 28px;
            width: 100%;
            max-width: 420px;
            margin: auto;
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18);
        }
        .farm-logo-circle {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: linear-gradient(145deg, var(--brand-green), var(--brand-green-dark));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fefce8;
            font-size: 1.2rem;
        }
        .otp-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 10px;
            color: var(--brand-green-dark);
        }
        .otp-subtitle {
            font-size: 0.85rem;
            color: #6b7280;
        }
        .form-control {
            background-color: var(--bg-soft);
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.95rem;
            text-align: center;
            letter-spacing: 0.3em;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: var(--brand-green-dark);
            box-shadow: 0 0 0 1px rgba(22, 163, 74, 0.3);
        }
        .btn-verify {
            background-color: var(--brand-green-dark);
            color: #fff;
            border-radius: 999px;
            font-weight: 700;
            padding: 11px;
            border: none;
            transition: 0.2s;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .btn-verify:hover {
            background-color: #052e16;
            color: #f9fafb;
        }
        .back-link {
            color: #6b7280;
        }
        .back-link:hover {
            color: var(--brand-green-dark);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="otp-card">
        <div class="text-center mb-3">
            <div class="farm-logo-circle">🌾</div>
            <div class="otp-title">Verify your account</div>
            <p class="otp-subtitle">Enter the 6-digit code we emailed you to activate your GreenFields account.</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger py-2 small border-0 rounded-3 text-center mb-3">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/verify-otp">
            <input type="hidden" name="username" value="{{ username }}">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary text-uppercase d-block text-center">Verification code</label>
                <input type="text" name="otp" maxlength="6" pattern="\d{6}" class="form-control" placeholder="• • • • • •" required>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn-verify">Verify & Continue</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <a href="/register" class="text-decoration-none small back-link">← Change email / start over</a>
        </div>
    </div>
</div>

</body>
</html>
