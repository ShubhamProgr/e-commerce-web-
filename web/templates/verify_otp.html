{% extends "base.html" %}

{% block title %}Verify OTP | Mota Anaj{% endblock %}

{% block extra_head %}
<style>
    .auth-shell {
        max-width: 470px;
        margin-inline: auto;
    }

    .auth-card {
        background: #fff;
        border-radius: 24px;
        border: 1px solid rgba(33, 73, 51, 0.15);
        box-shadow: 0 18px 34px rgba(24, 49, 34, 0.12);
        padding: 1.5rem;
    }

    .auth-title {
        font-family: 'Fraunces', serif;
        color: #1f3a2b;
        margin-bottom: 0.25rem;
    }

    .auth-subtitle {
        color: #5b6b61;
        font-size: 0.9rem;
        margin-bottom: 1rem;
    }

    .email-hint {
        border-radius: 12px;
        background: rgba(79, 165, 114, 0.14);
        color: #214933;
        padding: 0.65rem 0.72rem;
        margin-bottom: 1rem;
        font-size: 0.88rem;
        font-weight: 600;
    }

    .auth-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #214933;
        margin-bottom: 0.35rem;
    }

    .auth-input {
        border-radius: 12px;
        border: 1px solid rgba(33, 73, 51, 0.2);
        padding: 0.68rem 0.78rem;
        width: 100%;
        margin-bottom: 0.85rem;
    }

    .auth-input:focus {
        outline: none;
        border-color: #4fa572;
        box-shadow: 0 0 0 3px rgba(79, 165, 114, 0.24);
    }

    .btn-auth-primary,
    .btn-auth-secondary {
        width: 100%;
        display: inline-block;
        text-align: center;
        border-radius: 12px;
        padding: 0.72rem 0.88rem;
        font-weight: 800;
        text-decoration: none;
    }

    .btn-auth-primary {
        border: 0;
        color: #fff;
        background: linear-gradient(140deg, #2b6745, #4fa572);
    }

    .btn-auth-secondary {
        margin-top: 0.55rem;
        border: 1px solid rgba(33, 73, 51, 0.25);
        color: #214933;
        background: #fff;
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <h1 class="auth-title">Verify Your Account</h1>
        <p class="auth-subtitle">Enter the OTP sent by Mota Anaj to continue securely.</p>

        {% if email_mask %}
        <div class="email-hint"><i class="fa-regular fa-envelope"></i> Code sent to {{ email_mask }}</div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="username" value="{{ username }}">
            <input type="hidden" name="account_type" value="{{ account_type or 'customer' }}">
            <input type="hidden" name="next" value="{{ next_url or '' }}">

            <label class="auth-label" for="otp">Verification code</label>
            <input class="auth-input" type="text" id="otp" name="otp" placeholder="Enter 6-digit code" maxlength="6" required autofocus>

            <button class="btn-auth-primary" type="submit">Verify And Continue</button>
        </form>

        <form method="POST" action="{{ url_for('resend_otp') }}">
            <input type="hidden" name="username" value="{{ username }}">
            <input type="hidden" name="account_type" value="{{ account_type or 'customer' }}">
            <input type="hidden" name="next" value="{{ next_url or '' }}">
            <button class="btn-auth-secondary" type="submit">Resend OTP</button>
        </form>
    </div>
</section>
{% endblock %}
