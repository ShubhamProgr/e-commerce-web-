<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Admin Panel - Welcome {{ current_user.username }}</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Manage Inventory</h2>
        <div class="table-responsive bg-white p-4 shadow-sm rounded">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price (₹)</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in products %}
                    <tr>
                        <form action="/admin/edit/{{ product._id }}" method="POST">
                            <td><strong>{{ product.item }}</strong></td>
                            <td>{{ product.category }}</td>
                            <td>
                                <input type="number" name="price" class="form-control form-control-sm" value="{{ product.price }}" style="width: 100px;">
                            </td>
                            <td>
                                <input type="number" name="stock" class="form-control form-control-sm" value="{{ product.stock }}" style="width: 80px;">
                            </td>
                            <td>
                                <button type="submit" class="btn btn-primary btn-sm">Update</button>
                            </td>
                        </form>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
