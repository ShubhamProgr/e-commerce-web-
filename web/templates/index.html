<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">My Online Shop</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Our Catalog</h2>
        <div class="row">
            {% for product in products %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ product.item }}</h5>
                        <p class="badge bg-info text-dark">{{ product.category }}</p>
                        <h4 class="text-primary mt-2">₹{{ product.price }}</h4>
                        <p class="card-text text-muted">Stock: {{ product.stock }} units</p>
                        
                        <div class="d-grid gap-2">
                            <a href="/product/{{ product._id }}" class="btn btn-outline-dark">View Details</a>
                            <button class="btn btn-success">Add to Cart</button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
