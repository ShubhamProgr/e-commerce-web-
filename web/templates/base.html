<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}GreenFields Farm Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    :root {
        --brand-green: #1b7a40;
        --brand-green-dark: #14532d;
    }
    body { background: radial-gradient(circle at top, #e8f5e9 0, #f9fafb 55%, #f3f4f6 100%); font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .navbar { background: #ffffff !important; padding: 12px 0; border-bottom: 1px solid #e5e7eb; }
    .search-bar { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 15px; width: 100%; }
    .btn-add { color: var(--brand-green-dark); border: 1px solid var(--brand-green-dark); font-weight: bold; background: #fff; }
    .btn-add:hover { background: var(--brand-green-dark); color: #fff; }
</style>
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand fw-bold text-success me-4" href="/">GreenFields Farm Shop</a>
            <div class="flex-grow-1 mx-3">
                <input type="text" class="search-bar" placeholder="Search wheat, pulses, barley...">
            </div>
            <div class="ms-3">
                <a href="/login" class="text-dark fw-bold text-decoration-none">Login</a>
            </div>
        </div>
    </nav>
    <div class="container py-5">{% block content %}{% endblock %}</div>
</body>
</html>
