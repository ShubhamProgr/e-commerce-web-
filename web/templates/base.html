<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tech Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    :root { --zepto-green: #34a853; --zepto-purple: #3c006b; }
    body { background-color: #f3f4f6; font-family: 'Segoe UI', Roboto, sans-serif; }
    .navbar { background: #fff !important; padding: 12px 0; border-bottom: 1px solid #e5e7eb; }
    .search-bar { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 15px; width: 100%; }
    .btn-add { color: var(--zepto-green); border: 1px solid var(--zepto-green); font-weight: bold; background: #fff; }
    .btn-add:hover { background: var(--zepto-green); color: #fff; }
</style>
</head>
<body>
    <nav class="navbar sticky-top">
    <div class="container d-flex align-items-center">
        <a class="navbar-brand fw-bold text-success me-4" href="/">BLINKIT CLONE</a>
        <div class="flex-grow-1 mx-3">
            <input type="text" class="search-bar" placeholder="Search for 'Rice', 'Atta' or 'Milk'...">
        </div>
        <div class="ms-3">
            <a href="/login" class="text-dark fw-bold text-decoration-none">Login</a>
        </div>
    </div>
</nav>
    <div class="container py-5">{% block content %}{% endblock %}</div>
</body>
</html>
