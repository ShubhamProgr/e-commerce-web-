<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}GreenFields Farm Shop{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    :root {
        --brand-green: #1b7a40;
        --brand-green-dark: #14532d;
    }
    body { background: radial-gradient(circle at top, #e8f5e9 0, #f9fafb 55%, #f3f4f6 100%); font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .btn-add { color: var(--brand-green-dark); border: 1px solid var(--brand-green-dark); font-weight: bold; background: #fff; }
    .btn-add:hover { background: var(--brand-green-dark); color: #fff; }
</style>
</head>
<body>
    <div class="container py-5">{% block content %}{% endblock %}</div>
</body>
</html>
