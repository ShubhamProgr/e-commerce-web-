<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tech Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #0d6efd; --bg-light: #fbfbfb; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #2d3436; }
        .navbar { background: #fff !important; border-bottom: 1px solid #eee; }
        .card { border: none; transition: 0.3s; border-radius: 12px; background: #fff; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05) !important; }
        .btn-primary { border-radius: 8px; font-weight: 600; padding: 10px 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg py-3 sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">TECH HUB</a>
            <div class="d-flex align-items-center">
                {% if current_user.is_authenticated %}
                    <span class="me-3 text-muted">Hi, {{ current_user.username }}</span>
                    {% if current_user.role == 'admin' %}
                        <a href="/admin/dashboard" class="btn btn-dark btn-sm me-2">Admin</a>
                    {% endif %}
                    <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
                {% else %}
                    <a href="/login" class="btn btn-primary btn-sm px-4">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container py-5">{% block content %}{% endblock %}</div>
</body>
</html>
