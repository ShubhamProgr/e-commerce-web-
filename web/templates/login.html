<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Organic Pulse Collective</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-green: #2d7a4a;
            --brand-green-dark: #1a4d2e;
            --brand-accent: #52b788;
            --bg-soft: #f8fdf9;
        }
        body { 
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-soft) 0%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card { 
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            margin: auto;
            border: 1px solid rgba(45, 122, 74, 0.15);
            box-shadow: 0 20px 50px rgba(26, 77, 46, 0.12);
        }
        .farm-logo-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-green), var(--brand-accent));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        .brand-logo {
            font-weight: 800;
            color: var(--brand-green-dark);
            font-size: 1.3rem;
            text-decoration: none;
            display: block;
            margin-top: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .brand-subtitle {
            font-size: 0.8rem;
            color: #666;
        }
        .form-label {
            font-weight: 600;
            color: var(--brand-green-dark);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .form-control {
            background-color: var(--bg-soft);
            border: 1.5px solid #ddd;
            border-radius: 14px;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: var(--brand-green);
            box-shadow: 0 0 0 2px rgba(45, 122, 74, 0.15);
        }
        .btn-signin {
            background: linear-gradient(135deg, var(--brand-green), var(--brand-accent));
            color: #fff;
            border-radius: 14px;
            font-weight: 700;
            padding: 12px;
            border: none;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }
        .btn-signin:hover {
            background: linear-gradient(135deg, var(--brand-green-dark), var(--brand-green));
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 77, 46, 0.25);
        }
        .register-link {
            color: var(--brand-green);
            font-weight: 700;
            text-decoration: none;
        }
        .register-link:hover {
            color: var(--brand-green-dark);
        }
        .back-home-link {
            color: #666;
        }
        .back-home-link:hover {
            color: var(--brand-green-dark);
        }
        .divider-text {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="farm-logo-circle"><i class="fas fa-leaf"></i></div>
            <div class="brand-logo">Organic Pulse</div>
            <div class="brand-subtitle">Premium Pulses & Legumes</div>
        </div>

        <h5 class="text-center mb-4" style="color: #333; font-weight: 700;">Welcome Back, Farmer!</h5>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        <strong>Notice:</strong> {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Username or Email</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-signin w-100">Sign In</button>
        </form>

        <div class="divider-text">New to Organic Pulse?</div>

        <a href="{{ url_for('register') }}" class="btn btn-outline-success w-100" style="border-radius: 14px; font-weight: 600;">Create an Account</a>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="back-home-link"><i class="fas fa-arrow-left"></i> Back to Store</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
