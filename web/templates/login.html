{% extends "base.html" %}

{% block title %}Login | Mota Anaj{% endblock %}

{% block extra_head %}
<style>
    .auth-shell {
        max-width: 460px;
        margin-inline: auto;
    }

    .auth-card {
        background: #fff;
        border-radius: 24px;
        border: 1px solid rgba(33, 73, 51, 0.15);
        box-shadow: 0 18px 34px rgba(24, 49, 34, 0.12);
        padding: 1.5rem;
    }

    .auth-title {
        font-family: 'Fraunces', serif;
        color: #1f3a2b;
        margin-bottom: 0.25rem;
    }

    .auth-subtitle {
        color: #5b6b61;
        font-size: 0.9rem;
        margin-bottom: 1rem;
    }

    .auth-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #214933;
        margin-bottom: 0.35rem;
    }

    .auth-input {
        border-radius: 12px;
        border: 1px solid rgba(33, 73, 51, 0.2);
        padding: 0.68rem 0.78rem;
        width: 100%;
        margin-bottom: 0.85rem;
    }

    .auth-input:focus {
        outline: none;
        border-color: #4fa572;
        box-shadow: 0 0 0 3px rgba(79, 165, 114, 0.24);
    }

    .btn-auth-primary,
    .btn-auth-secondary {
        width: 100%;
        display: inline-block;
        text-align: center;
        border-radius: 12px;
        padding: 0.72rem 0.88rem;
        font-weight: 800;
        text-decoration: none;
    }

    .btn-auth-primary {
        border: 0;
        color: #fff;
        background: linear-gradient(140deg, #2b6745, #4fa572);
    }

    .btn-auth-secondary {
        margin-top: 0.55rem;
        border: 1px solid rgba(33, 73, 51, 0.25);
        color: #214933;
        background: #fff;
    }
</style>
{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to continue shopping healthy staples from Mota Anaj.</p>

        <form method="POST">
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">

            <label class="auth-label" for="username">Username or Email</label>
            <input class="auth-input" type="text" id="username" name="username" placeholder="Enter username or email" required>

            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" type="password" id="password" name="password" placeholder="Enter password" required>

            <button class="btn-auth-primary" type="submit">Sign In</button>
        </form>

        <a class="btn-auth-secondary" href="{{ url_for('register', next=request.args.get('next', '')) }}">Create New Account</a>
    </div>
</section>
{% endblock %}
