<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.item }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">← Back to Shop</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow-lg border-0">
            <div class="row g-0">
                <div class="col-md-6">
                    <img src="https://via.placeholder.com/600x600?text={{ product.item }}" class="img-fluid rounded-start" alt="{{ product.item }}">
                </div>
                <div class="col-md-6">
                    <div class="card-body p-5">
                        <h1 class="display-5 fw-bold">{{ product.item }}</h1>
                        <p class="lead badge bg-secondary fs-6">{{ product.category }}</p>
                        <hr>
                        <h2 class="text-success mb-4">Price: ₹{{ product.price }}</h2>
                        
                        <div class="mb-4">
                            <h5>Product Description</h5>
                            <p class="text-secondary">
                                This is a premium {{ product.item }} designed for high performance and reliability. 
                                Perfect for your tech setup or daily use.
                            </p>
                        </div>

                        <p class="mb-4"><strong>Inventory Status:</strong> {{ product.stock }} items available</p>
                        
                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg mb-2">Buy Now</button>
                            <button class="btn btn-outline-success">Add to Wishlist</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
