<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart | QuickStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --brand-purple: #3c006b; --brand-green: #1c8932; }
        body { font-family: 'Outfit', sans-serif; background-color: #f3f4f6; }
        .cart-card { border-radius: 20px; border: none; }
        .btn-checkout { background: var(--brand-purple); color: white; font-weight: 700; border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" style="color: var(--brand-purple);" href="/">← BACK TO SHOP</a>
            <span class="fw-bold">My Shopping Cart</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                {% if items %}
                    {% for item in items %}
                    <div class="card cart-card shadow-sm mb-3">
                        <div class="card-body d-flex align-items-center">
                            <img src="https://placehold.co/80x80?text=Product" class="rounded me-3" alt="item">
                            <div class="flex-grow-1">
                                <h6 class="mb-0 fw-bold">{{ item.item }}</h6>
                                <small class="text-muted">{{ item.category }}</small>
                            </div>
                            <div class="text-end me-4">
                                <span class="fw-bold">₹{{ item.price }}</span>
                            </div>
                            <a href="/remove_from_cart/{{ item._id }}" class="btn btn-sm btn-outline-danger">Remove</a>
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="text-center py-5">
                        <h4 class="text-muted">Your cart is empty!</h4>
                        <a href="/" class="btn btn-success mt-3">Start Shopping</a>
                    </div>
                {% endif %}
            </div>
            
            <div class="col-lg-4">
                <div class="card cart-card shadow-sm p-4">
                    <h5 class="fw-bold mb-4">Bill Details</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Item Total</span>
                        <span>₹{{ total }}</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Delivery Fee</span>
                        <span class="text-success fw-bold">FREE</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold">Grand Total</span>
                        <span class="fw-bold fs-5">₹{{ total }}</span>
                    </div>
                    <button class="btn btn-checkout w-100 py-3">PROCEED TO PAY</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
